<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>Rust/Wgpu</title>
    <style>
      html, body, .root {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
      }
      .root {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        /* fill the viewport in CSS pixels */
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  <link rel="modulepreload" href="/atlas-app-9e27a628c39965a8.js" crossorigin="anonymous" integrity="sha384-P4KqXOStvvrwu6LO9xyArrWW9AxsFQF4Xj+Ys94oEyeI8iwNUjlY0mBtCanR+iIu"><link rel="preload" href="/atlas-app-9e27a628c39965a8_bg.wasm" crossorigin="anonymous" integrity="sha384-QzRdmSTm17DYH/4Taeb829S0QjLTALR2c61wrA220xqQqDhlnsFKmOT/Td4icgtV" as="fetch" type="application/wasm"></head>

  <body>
    <!-- 1) Your resize logic must run *before* the WASM loader -->
    <script>
      const MAX_DIM = 3840; // only used if we really exceed it

      function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        // 1) true CSS layout size
        const cssW = canvas.clientWidth;
        const cssH = canvas.clientHeight;
        // 2) device pixels
        const dpr = window.devicePixelRatio || 1;
        const physW = Math.round(cssW * dpr);
        const physH = Math.round(cssH * dpr);

        // 3) only clamp if we’re over the GPU’s max
        const finalW = physW > MAX_DIM ? MAX_DIM : physW;
        const finalH = physH > MAX_DIM ? MAX_DIM : physH;

        <!-- console.debug( -->
        <!--   `%cresize: CSS ${cssW}×${cssH} @ DPR ${dpr} → ` -->
        <!--   + `physical ${physW}×${physH} → final ${finalW}×${finalH}`, -->
        <!--   "color: teal;" -->
        <!-- ); -->

        canvas.width  = finalW;
        canvas.height = finalH;
      }

      window.addEventListener("load",   resizeCanvas);
      window.addEventListener("resize", resizeCanvas);
    </script>

    <!-- 2) Then Trunk injects your WASM loader: -->
    
<script type="module">
import init, * as bindings from '/atlas-app-9e27a628c39965a8.js';
const wasm = await init({ module_or_path: '/atlas-app-9e27a628c39965a8_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>

    <div class="root">
      <canvas id="canvas" class="main-canvas"></canvas>
    </div>
  <script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
